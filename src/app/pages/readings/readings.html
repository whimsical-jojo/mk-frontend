<img src="/LiteraturBuroBanner.jpg" alt="LiteraturBuroBanner">
<div>
    <h1 class="text-2xl md:text-3xl font-extrabold mt-4 text-purple-800">
        Lesungen
    </h1>
    <p class=" text-gray-700 sm:text-sm md:text-base lg:text-lg mt-4 px-5">
        Video-Lesungen aus bereits veröffentlichten Büchern und aktuellen Projekten
    </p>
</div>
<div class="md:grid md:grid-cols-2 gap-4 mt-8">
    @for(reading of readings(); track reading.id) {
    <h1 class="text-xl font-semibold text-purple-700 mb-2">{{ reading.title }}</h1>
    <iframe src="reading.url" class="w-full aspect-video shadow-md"></iframe>
    }
</div>
